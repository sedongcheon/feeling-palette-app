name: feeling_palette
description: "AI 감정일기 앱 - Feeling Palette"
publish_to: 'none'
version: 1.0.1+5

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path: ^1.9.0
  http: ^1.2.2
  provider: ^6.1.2
  table_calendar: ^3.1.3
  intl: ^0.20.2
  share_plus: ^11.1.0
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  crypto: ^3.0.5
  google_mobile_ads: ^5.2.0
  app_tracking_transparency: ^2.0.6
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFE8F4"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
